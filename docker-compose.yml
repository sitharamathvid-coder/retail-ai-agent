services:
  postgres:
    image: postgres:16-alpine
    container_name: retail_analytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-retail_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/workspace/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail_user} -d ${POSTGRES_DB:-retail_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    image: python:3.12-slim
    container_name: retail_analytics_mcp_server
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - .:/workspace
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn mcp_server.server:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
